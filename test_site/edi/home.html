<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>練習 購買システム（Practice）</title>

<!-- フレーム構成: [0]=メニュー, [1]=スペーサ(極小), [2]=コンテンツ。
     実 EDI の frame[0]（メニュー）/ frame[2]（検索フォーム）を再現するための並び。 -->
<frameset cols="220,1,*">
  <frame name="menu" src="menu.html">
  <frame name="spacer" src="blank.html">
  <frame name="content" src="content_home.html">
  <noframes><body>このページはフレーム対応ブラウザが必要です。</body></noframes>
</frameset>
</html>
